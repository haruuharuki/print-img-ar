<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Print Image AR Starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="./src/ar-config.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
      }

      .a-canvas {
        background: transparent !important;
      }

      .a-enter-vr,
      .a-enter-ar {
        display: none !important;
      }

      .overlay-ui {
        position: fixed;
        z-index: 20;
        left: 12px;
        right: 12px;
        bottom: 16px;
        display: grid;
        gap: 8px;
        pointer-events: none;
      }

      .panel {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 14px;
        line-height: 1.35;
        text-align: center;
        backdrop-filter: blur(8px);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 16px;
        font-weight: 700;
        background: #ffffff;
        color: #111111;
        pointer-events: auto;
      }

      .hidden {
        display: none;
      }

      .capture-button {
        position: fixed;
        z-index: 25;
        left: 50%;
        bottom: max(86px, calc(72px + env(safe-area-inset-bottom)));
        width: 68px;
        height: 68px;
        padding: 0;
        border: 4px solid rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        transform: translateX(-50%);
      }

      .capture-button::after {
        content: "";
        position: absolute;
        inset: 11px;
        border-radius: 50%;
        background: #ffffff;
      }

      .capture-button:disabled {
        opacity: 0.45;
      }

      .camera-switch-button {
        position: fixed;
        z-index: 25;
        top: max(12px, env(safe-area-inset-top));
        right: 12px;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.68);
        color: #ffffff;
        font-size: 22px;
        line-height: 1;
        backdrop-filter: blur(8px);
      }

      .camera-switch-button:disabled {
        opacity: 0.45;
      }

      .capture-preview {
        position: fixed;
        z-index: 40;
        inset: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto auto;
        gap: 12px;
        padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.86);
        box-sizing: border-box;
      }

      .capture-preview.hidden {
        display: none;
      }

      .capture-preview img {
        align-self: center;
        justify-self: center;
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        object-fit: contain;
        background: #111111;
      }

      .capture-help {
        margin: 0;
        padding: 9px 11px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
      }

      .capture-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .capture-actions button {
        border-radius: 8px;
      }

      @media (max-width: 720px) {
        .capture-button {
          bottom: max(88px, calc(72px + env(safe-area-inset-bottom)));
          width: 62px;
          height: 62px;
        }

        .capture-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="overlay-ui">
      <div id="status" class="panel"></div>
      <button id="startButton"></button>
    </div>

    <button
      id="captureButton"
      class="capture-button hidden"
      type="button"
      aria-label="ถ่ายภาพ AR"
      disabled
    ></button>

    <button
      id="cameraSwitchButton"
      class="camera-switch-button hidden"
      type="button"
      aria-label="สลับกล้องหน้าและหลัง"
      disabled
    >↺</button>

    <div id="capturePreview" class="capture-preview hidden" role="dialog" aria-modal="true">
      <img id="captureImage" alt="AR capture preview" />
      <p id="captureHelp" class="capture-help"></p>
      <div class="capture-actions">
        <button id="retakeCaptureButton" type="button">Retake</button>
        <button id="shareCaptureButton" type="button">Share</button>
        <button id="downloadCaptureButton" type="button">Download</button>
        <button id="closeCaptureButton" type="button">Close</button>
      </div>
    </div>

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; preserveDrawingBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="arVideo"
          preload="auto"
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="imageTarget">
        <a-video
          src="#arVideo"
        ></a-video>
      </a-entity>
    </a-scene>

    <script src="./src/ar-capture.js"></script>
    <script src="./src/ar-viewer.js"></script>
  </body>
</html>
