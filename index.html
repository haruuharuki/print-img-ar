<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Print Image AR Starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="./src/ar-config.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
      }

      .a-canvas {
        background: transparent !important;
      }

      .overlay-ui {
        position: fixed;
        z-index: 20;
        left: 12px;
        right: 12px;
        bottom: 16px;
        display: grid;
        gap: 8px;
        pointer-events: none;
      }

      .panel {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 14px;
        line-height: 1.35;
        text-align: center;
        backdrop-filter: blur(8px);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 16px;
        font-weight: 700;
        background: #ffffff;
        color: #111111;
        pointer-events: auto;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="overlay-ui">
      <div id="status" class="panel"></div>
      <button id="startButton"></button>
    </div>

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="arVideo"
          preload="auto"
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="imageTarget">
        <a-video
          src="#arVideo"
        ></a-video>
      </a-entity>
    </a-scene>

    <script src="./src/ar-viewer.js"></script>
  </body>
</html>
