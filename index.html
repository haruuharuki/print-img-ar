<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Print Image AR Starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      window.AR_DEPLOY_VERSION_PROMISE = fetch("./src/ar-deploy-version.js", { cache: "no-store" })
        .then((response) => response.ok ? response.text() : "")
        .then((text) => {
          const match = text.match(/AR_DEPLOY_VERSION\s*=\s*("([^"]+)"|'([^']+)')/);
          const deployVersion = match ? match[2] || match[3] : window.AR_DEPLOY_VERSION || "dev";
          window.AR_DEPLOY_VERSION = deployVersion;
          return deployVersion;
        })
        .catch(() => window.AR_DEPLOY_VERSION || "dev");

      window.AR_LOAD_VERSIONED_SCRIPT = function (src, deployVersion) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = `${src}?v=${encodeURIComponent(deployVersion)}`;
          script.onload = resolve;
          script.onerror = reject;
          document.head.append(script);
        });
      };
    </script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
      }

      .a-canvas {
        background: transparent !important;
      }

      .a-enter-vr,
      .a-enter-ar {
        display: none !important;
      }

      .overlay-ui {
        position: fixed;
        z-index: 20;
        left: 12px;
        right: 12px;
        bottom: 16px;
        display: grid;
        gap: 8px;
        pointer-events: none;
      }

      .panel {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 14px;
        line-height: 1.35;
        text-align: center;
        backdrop-filter: blur(8px);
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 16px;
        font-weight: 700;
        background: #ffffff;
        color: #111111;
        pointer-events: auto;
      }

      .hidden {
        display: none;
      }

      .capture-button {
        position: fixed;
        z-index: 25;
        left: 50%;
        bottom: max(86px, calc(72px + env(safe-area-inset-bottom)));
        width: 68px;
        height: 68px;
        padding: 0;
        border: 4px solid rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        transform: translateX(-50%);
      }

      .capture-button::after {
        content: "";
        position: absolute;
        inset: 11px;
        border-radius: 50%;
        background: #ffffff;
      }

      .capture-button:disabled {
        opacity: 0.45;
      }

      .camera-mode-switch {
        position: fixed;
        z-index: 25;
        left: 50%;
        bottom: max(158px, calc(144px + env(safe-area-inset-bottom)));
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        width: min(220px, calc(100vw - 32px));
        padding: 4px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.58);
        transform: translateX(-50%);
        backdrop-filter: blur(8px);
        pointer-events: auto;
      }

      .mode-button {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: transparent;
        color: #ffffff;
        font-size: 13px;
      }

      .mode-button.is-active {
        background: #ffffff;
        color: #111111;
      }

      .recording-timer {
        position: fixed;
        z-index: 25;
        top: max(14px, env(safe-area-inset-top));
        left: 50%;
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 78px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.68);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        transform: translateX(-50%);
        backdrop-filter: blur(8px);
      }

      .recording-timer.hidden {
        display: none;
      }

      .recording-timer::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #ff3b30;
      }

      .capture-button.is-recording {
        border-color: rgba(255, 59, 48, 0.92);
      }

      .capture-button.is-recording::after {
        inset: 17px;
        border-radius: 8px;
        background: #ff3b30;
      }

      .camera-switch-button {
        position: fixed;
        z-index: 25;
        top: max(12px, env(safe-area-inset-top));
        right: 12px;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.68);
        color: #ffffff;
        font-size: 22px;
        line-height: 1;
        backdrop-filter: blur(8px);
      }

      .camera-switch-button:disabled {
        opacity: 0.45;
      }

      .live-button {
        position: fixed;
        z-index: 25;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        width: auto;
        min-width: 72px;
        height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.68);
        color: #ffffff;
        font-size: 14px;
        backdrop-filter: blur(8px);
      }

      .live-exit-button,
      .live-add-button,
      .live-delete-button {
        position: fixed;
        z-index: 35;
        top: max(12px, env(safe-area-inset-top));
        width: auto;
        min-width: 44px;
        height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.72);
        color: #ffffff;
        font-size: 14px;
        backdrop-filter: blur(8px);
      }

      .live-exit-button {
        left: 12px;
      }

      .live-add-button {
        left: 76px;
        min-width: 44px;
        padding: 0;
        font-size: 24px;
        line-height: 1;
      }

      .live-delete-button {
        right: 12px;
      }

      .live-sticker-layer {
        position: fixed;
        z-index: 30;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .live-sticker {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(58vw, 320px);
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center center;
        touch-action: none;
        pointer-events: auto;
        user-select: none;
        filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.22));
        will-change: transform, filter;
      }

      .live-sticker.is-lifting,
      .live-sticker.is-settling {
        transition:
          transform 180ms cubic-bezier(0.2, 0.9, 0.24, 1.08),
          filter 180ms ease-out;
      }

      .live-sticker.is-dragging {
        filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.42));
      }

      .live-sticker.is-settling {
        filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.26));
      }

      .live-sticker video {
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
      }

      @media (prefers-reduced-motion: reduce) {
        .live-sticker.is-lifting,
        .live-sticker.is-settling {
          transition: none;
        }
      }

      .live-selection {
        position: absolute;
        left: 50%;
        top: 50%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.78);
        transform-origin: center center;
        pointer-events: none;
      }

      .live-selection-handle {
        position: absolute;
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.92);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.34);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
        touch-action: none;
      }

      .live-selection-resize {
        right: -21px;
        bottom: -21px;
      }

      .live-selection-duplicate {
        left: -21px;
        top: -21px;
        color: #ffffff;
        font-size: 22px;
        line-height: 1;
      }

      .live-selection-flip {
        left: -21px;
        bottom: -21px;
        color: #ffffff;
        font-size: 21px;
        line-height: 1;
      }

      .live-selection-resize::before {
        content: "";
        width: 13px;
        height: 13px;
        border-right: 2px solid #ffffff;
        border-bottom: 2px solid #ffffff;
      }

      .live-selection-rotate {
        left: 50%;
        top: -66px;
        transform: translateX(-50%);
      }

      .live-selection-rotate::before {
        content: "";
        width: 12px;
        height: 12px;
        border: 2px solid #ffffff;
        border-left-color: transparent;
        border-radius: 50%;
      }

      .live-selection-rotate-connector {
        position: absolute;
        left: 50%;
        top: -24px;
        width: 1px;
        height: 24px;
        background: rgba(255, 255, 255, 0.7);
        transform: translateX(-50%);
        pointer-events: none;
      }

      .capture-preview {
        position: fixed;
        z-index: 40;
        inset: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto auto;
        gap: 12px;
        padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.86);
        box-sizing: border-box;
      }

      .capture-preview.hidden {
        display: none;
      }

      .capture-preview img {
        align-self: center;
        justify-self: center;
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        object-fit: contain;
        background: #111111;
      }

      .capture-preview video {
        align-self: center;
        justify-self: center;
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        background: #111111;
      }

      .capture-help {
        margin: 0;
        padding: 9px 11px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
      }

      .capture-actions {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .capture-actions button {
        border-radius: 8px;
      }

      @media (max-width: 720px) {
        .capture-button {
          bottom: max(88px, calc(72px + env(safe-area-inset-bottom)));
          width: 62px;
          height: 62px;
        }

        .camera-mode-switch {
          bottom: max(158px, calc(142px + env(safe-area-inset-bottom)));
        }

        .capture-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="overlay-ui">
      <div id="status" class="panel"></div>
      <button id="startButton"></button>
    </div>

    <button
      id="captureButton"
      class="capture-button hidden"
      type="button"
      aria-label="ถ่ายภาพ AR"
      disabled
    ></button>

    <div id="cameraModeSwitch" class="camera-mode-switch hidden" role="group" aria-label="Capture mode">
      <button id="photoModeButton" class="mode-button is-active" type="button">Photo</button>
      <button id="videoModeButton" class="mode-button" type="button">Video</button>
    </div>

    <div id="recordingTimer" class="recording-timer hidden">00:00</div>

    <button
      id="cameraSwitchButton"
      class="camera-switch-button hidden"
      type="button"
      aria-label="สลับกล้องหน้าและหลัง"
      disabled
    >↺</button>

    <button id="liveModeButton" class="live-button hidden" type="button" disabled>Live</button>
    <button id="liveExitButton" class="live-exit-button hidden" type="button">AR</button>
    <button
      id="liveAddButton"
      class="live-add-button hidden"
      type="button"
      aria-label="????? Live sticker ????????????????????"
      title="????? Live sticker"
    >+</button>
    <button id="liveDeleteButton" class="live-delete-button hidden" type="button">Delete</button>
    <div id="liveStickerLayer" class="live-sticker-layer hidden" aria-label="Live sticker layer"></div>

    <div id="capturePreview" class="capture-preview hidden" role="dialog" aria-modal="true">
      <img id="captureImage" alt="AR capture preview" />
      <video id="captureVideo" class="hidden" controls playsinline></video>
      <p id="captureHelp" class="capture-help"></p>
      <div class="capture-actions">
        <button id="retakeCaptureButton" type="button">Retake</button>
        <button id="shareCaptureButton" type="button">Share</button>
        <button id="downloadCaptureButton" type="button">Download</button>
        <button id="closeCaptureButton" type="button">Close</button>
      </div>
    </div>

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; preserveDrawingBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets id="arAssets"></a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="targetRoot"></a-entity>
    </a-scene>

    <script>
      (async function () {
        const deployVersion = await window.AR_DEPLOY_VERSION_PROMISE;
        await window.AR_LOAD_VERSIONED_SCRIPT("./src/ar-config.js", deployVersion);
        await window.AR_LOAD_VERSIONED_SCRIPT("./src/ar-library.js", deployVersion);
        await window.AR_LOAD_VERSIONED_SCRIPT("./src/ar-capture.js", deployVersion);
        await window.AR_LOAD_VERSIONED_SCRIPT("./src/ar-live.js", deployVersion);
        await window.AR_LOAD_VERSIONED_SCRIPT("./src/ar-viewer.js", deployVersion);
      })().catch((error) => {
        console.error("AR viewer failed to load", error);
      });
    </script>
  </body>
</html>
