<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Creator Preview - Print Image AR Starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="./src/ar-config.js"></script>
    <script src="./src/ar-library.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
      }

      .a-canvas {
        background: transparent !important;
      }

      .creator-shell {
        position: fixed;
        z-index: 30;
        inset: 0;
        pointer-events: none;
      }

      .top-bar {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        pointer-events: auto;
      }

      .status {
        flex: 1;
        min-width: 0;
        padding: 9px 11px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 13px;
        line-height: 1.35;
        backdrop-filter: blur(8px);
      }

      .start-button,
      .panel-toggle,
      .library-button,
      .action-button {
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .start-button,
      .panel-toggle,
      .library-button {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 12px;
        background: #ffffff;
        color: #111111;
      }

      .control-panel {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        max-height: min(54vh, 520px);
        padding: 12px;
        overflow: auto;
        border-radius: 8px;
        background: rgba(18, 18, 18, 0.86);
        color: #ffffff;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .creator-shell.is-collapsed .control-panel {
        display: none;
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .control-group {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .control-label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #f2f2f2;
        font-size: 12px;
        font-weight: 700;
      }

      .control-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 76px;
        gap: 8px;
        align-items: center;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #39d98a;
      }

      input[type="number"],
      input[type="text"],
      select,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        font: inherit;
      }

      input[type="number"],
      input[type="text"],
      select {
        height: 36px;
        padding: 0 8px;
      }

      select {
        background: #ffffff;
        color: #111111;
        cursor: pointer;
      }

      select option {
        background: #ffffff;
        color: #111111;
      }

      textarea {
        min-height: 110px;
        padding: 10px;
        resize: vertical;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      input[type="file"] {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        font: inherit;
      }

      progress {
        width: 100%;
        height: 12px;
        accent-color: #39d98a;
      }

      .creator-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .creator-tab {
        min-height: 36px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #ffffff;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .creator-tab.is-active {
        background: #ffffff;
        color: #111111;
      }

      .creator-tab-panel {
        display: grid;
        gap: 10px;
      }

      .creator-tab-panel.hidden {
        display: none;
      }

      .compiler-panel {
        display: grid;
        gap: 10px;
      }

      .compiler-title {
        margin: 0;
        color: #ffffff;
        font-size: 14px;
        line-height: 1.3;
      }

      .compiler-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 10px;
        align-items: stretch;
      }

      .compiler-preview {
        display: grid;
        place-items: center;
        min-height: 132px;
        overflow: hidden;
        border: 1px dashed rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
      }

      .compiler-preview img {
        display: block;
        max-width: 100%;
        max-height: 180px;
        object-fit: contain;
      }

      .compiler-preview video {
        display: block;
        max-width: 100%;
        max-height: 180px;
        object-fit: contain;
      }

      .target-preview-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
        gap: 8px;
        width: 100%;
      }

      .target-preview-item {
        display: grid;
        gap: 5px;
        min-width: 0;
      }

      .target-preview-item img {
        width: 100%;
        height: 82px;
        border-radius: 6px;
        object-fit: contain;
        background: rgba(0, 0, 0, 0.18);
      }

      .target-preview-item span {
        overflow: hidden;
        color: #f2f2f2;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .compiler-status {
        margin: 0;
        color: #f2f2f2;
        font-size: 12px;
        line-height: 1.4;
      }

      .compiler-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1.4fr 1fr 0.8fr;
        gap: 8px;
      }

      .action-button {
        min-height: 40px;
        padding: 0 12px;
        background: #ffffff;
        color: #111111;
      }

      .action-button.secondary {
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
      }

      .action-button.primary {
        background: #39d98a;
        color: #06140d;
      }

      .library-panel,
      .library-preview-modal {
        position: absolute;
        top: max(64px, calc(52px + env(safe-area-inset-top)));
        right: 12px;
        bottom: auto;
        left: auto;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 10px;
        width: min(760px, calc(100vw - 24px));
        max-height: min(72vh, 680px);
        padding: 12px;
        overflow: hidden;
        border-radius: 10px;
        background: rgba(244, 245, 246, 0.96);
        color: #111111;
        box-shadow: 0 18px 52px rgba(0, 0, 0, 0.36);
        pointer-events: auto;
      }

      .library-preview-modal {
        z-index: 45;
        inset: max(64px, calc(52px + env(safe-area-inset-top))) 12px max(12px, env(safe-area-inset-bottom));
        width: auto;
        max-height: none;
        grid-template-rows: auto minmax(0, 1fr);
        background: rgba(18, 18, 18, 0.92);
        color: #ffffff;
      }

      .library-panel.hidden,
      .library-preview-modal.hidden {
        display: none;
      }

      .library-header,
      .library-preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .library-title,
      .library-preview-title {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
      }

      .library-status {
        margin: 0;
        color: #3a3a3a;
        font-size: 13px;
      }

      .library-close-button {
        min-height: 36px;
        padding: 0 12px;
        border: 0;
        border-radius: 8px;
        background: #111111;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .library-header-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .library-trash-button {
        min-height: 36px;
        padding: 0 12px;
        border: 0;
        border-radius: 8px;
        background: #ffffff;
        color: #111111;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .library-trash-button.is-danger {
        background: #b91c1c;
        color: #ffffff;
      }

      .library-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 10px;
        align-content: start;
        align-items: start;
        min-height: 0;
        overflow: auto;
        padding-right: 2px;
      }

      .library-card {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 10px;
        align-self: start;
        padding: 10px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 8px;
        background: #ffffff;
      }

      .library-card-media {
        display: grid;
        gap: 8px;
      }

      .library-card img,
      .library-card video {
        width: 72px;
        height: 72px;
        border-radius: 6px;
        object-fit: contain;
        background: #eeeeee;
      }

      .library-card video {
        height: 54px;
      }

      .library-card-body {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .library-card-title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }

      .library-card-title h3 {
        margin: 0;
        overflow: hidden;
        color: #111111;
        font-size: 15px;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .library-badge {
        flex: 0 0 auto;
        padding: 3px 7px;
        border-radius: 999px;
        background: #e8f8ef;
        color: #0f6b3d;
        font-size: 11px;
        font-weight: 800;
      }

      .library-badge.is-disabled {
        background: #eeeeee;
        color: #555555;
      }

      .library-meta {
        display: grid;
        gap: 3px;
        margin: 0;
        color: #333333;
        font-size: 11px;
        line-height: 1.35;
      }

      .library-meta div {
        overflow-wrap: anywhere;
      }

      .library-card-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .library-card-actions button {
        min-height: 32px;
        padding: 0 8px;
        border: 0;
        border-radius: 7px;
        background: #111111;
        color: #ffffff;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .library-card-actions button:disabled {
        background: #d8d8d8;
        color: #666666;
        cursor: not-allowed;
      }

      .library-empty {
        margin: 0;
        padding: 24px;
        border-radius: 8px;
        background: #ffffff;
        color: #333333;
        text-align: center;
      }

      .library-preview-content {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 12px;
        min-height: 0;
      }

      .library-preview-content img,
      .library-preview-content video {
        align-self: center;
        justify-self: center;
        max-width: 100%;
        max-height: 100%;
        border-radius: 8px;
        background: #111111;
        object-fit: contain;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .top-bar {
          align-items: stretch;
        }

        .status {
          font-size: 12px;
        }

        .start-button,
        .panel-toggle {
          min-width: 72px;
        }

        .control-grid {
          grid-template-columns: 1fr;
        }

        .compiler-grid,
        .compiler-actions {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .library-panel,
        .library-preview-modal {
          inset: max(64px, calc(52px + env(safe-area-inset-top))) 8px max(8px, env(safe-area-inset-bottom));
          width: auto;
          max-height: none;
          padding: 10px;
        }

        .library-list {
          grid-template-columns: 1fr;
        }

        .library-card {
          grid-template-columns: 72px minmax(0, 1fr);
        }

        .library-card img,
        .library-card video {
          width: 72px;
          height: 72px;
        }

        .library-card video {
          height: 54px;
        }

        .library-card-actions {
          grid-template-columns: 1fr;
        }

        .library-header {
          align-items: flex-start;
        }

        .library-preview-content {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="creator-shell" id="creatorShell">
      <div class="top-bar">
        <div id="creatorStatus" class="status"></div>
        <button id="libraryButton" class="library-button" type="button" aria-label="Target Library">Library</button>
        <button id="creatorStartButton" class="start-button"></button>
        <button id="panelToggle" class="panel-toggle" aria-expanded="true">ยุบ</button>
      </div>

      <section
        id="libraryPanel"
        class="library-panel hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="libraryTitle"
      >
        <div class="library-header">
          <h2 id="libraryTitle" class="library-title">Target Library</h2>
          <div class="library-header-actions">
            <button id="libraryClearTrashButton" class="library-trash-button is-danger hidden" type="button">Clear all</button>
            <button id="libraryTrashButton" class="library-trash-button" type="button" aria-label="Deleted targets">Trash</button>
            <button id="libraryCloseButton" class="library-close-button" type="button">Close</button>
          </div>
        </div>
        <p id="libraryStatus" class="library-status"></p>
        <div id="libraryList" class="library-list"></div>
      </section>

      <section
        id="libraryPreviewModal"
        class="library-preview-modal hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="libraryPreviewTitle"
      >
        <div class="library-preview-header">
          <h2 id="libraryPreviewTitle" class="library-preview-title">Target Preview</h2>
          <button id="libraryPreviewCloseButton" class="library-close-button" type="button">Close</button>
        </div>
        <div class="library-preview-content">
          <img id="libraryPreviewImage" alt="Target image preview" />
          <video id="libraryPreviewVideo" controls playsinline muted></video>
        </div>
      </section>

      <section class="control-panel" aria-label="Overlay controls">
        <div class="creator-tabs" role="tablist" aria-label="Creator steps">
          <button id="setupTabButton" class="creator-tab is-active" type="button" role="tab" aria-controls="setupTabPanel" aria-selected="true" data-tab="setup">Project Setup</button>
          <button id="adjustTabButton" class="creator-tab" type="button" role="tab" aria-controls="adjustTabPanel" aria-selected="false" data-tab="adjust">Overlay Adjust</button>
        </div>

        <section id="setupTabPanel" class="creator-tab-panel" role="tabpanel" aria-labelledby="setupTabButton">
          <section class="compiler-panel" aria-label="Project setup">
            <h2 class="compiler-title">Project Setup</h2>
            <div class="compiler-grid">
              <div class="control-group">
                <label class="control-label" for="targetNameInput">Target name</label>
                <input id="targetNameInput" type="text" placeholder="Example: Nuwa" />
                <label class="control-label" for="targetImageInput">Target image</label>
                <input id="targetImageInput" type="file" accept="image/png,image/jpeg,image/webp" />
                <p id="compilerStatus" class="compiler-status">Choose a target image and MP4 overlay, then save it into the local library.</p>
                <progress id="compilerProgress" class="hidden" max="100" value="0"></progress>
              </div>
              <div class="compiler-preview">
                <div id="targetImagePreviewList" class="target-preview-list hidden" aria-label="Target image previews"></div>
              </div>
            </div>
            <div class="compiler-grid">
              <div class="control-group">
                <label class="control-label" for="overlayMediaInput">Overlay video</label>
                <input id="overlayMediaInput" type="file" accept="video/mp4" />
                <p id="overlayMediaStatus" class="compiler-status">Choose an MP4 overlay for this target.</p>
              </div>
              <div class="compiler-preview">
                <img id="overlayImagePreview" class="hidden" alt="Overlay image preview" />
                <video id="overlayVideoPreview" class="hidden" controls playsinline muted></video>
              </div>
            </div>
            <div class="compiler-actions">
              <button id="compileTargetButton" class="action-button primary" type="button" disabled>Save target to library</button>
              <button id="downloadMindButton" class="action-button secondary" type="button" disabled>Download last targets.mind</button>
            </div>
          </section>
        </section>

        <section id="adjustTabPanel" class="creator-tab-panel hidden" role="tabpanel" aria-labelledby="adjustTabButton">
          <label class="control-group" for="overlayTargetSelect">
            <span class="control-label">Target</span>
            <select id="overlayTargetSelect"></select>
          </label>
          <div class="control-grid" id="overlayControls"></div>
          <textarea id="overlaySnippet" readonly></textarea>
          <div class="actions">
            <button id="deployConfigButton" class="action-button primary">Save & Deploy Library</button>
            <button id="saveConfigButton" class="action-button">Save local</button>
            <button id="downloadSnippetButton" class="action-button secondary">Download</button>
          </div>
        </section>
      </section>
    </div>

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="creatorArVideo"
          preload="auto"
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="creatorImageTarget">
        <a-video src="#creatorArVideo"></a-video>
      </a-entity>
    </a-scene>

    <script src="./src/creator-preview.js"></script>
    <script type="module" src="./src/mindar-target-compiler.js"></script>
  </body>
</html>
