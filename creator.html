<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <title>Creator Preview - Print Image AR Starter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="./src/ar-config.js"></script>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
      }

      .a-canvas {
        background: transparent !important;
      }

      .creator-shell {
        position: fixed;
        z-index: 30;
        inset: 0;
        pointer-events: none;
      }

      .top-bar {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        pointer-events: auto;
      }

      .status {
        flex: 1;
        min-width: 0;
        padding: 9px 11px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff;
        font-size: 13px;
        line-height: 1.35;
        backdrop-filter: blur(8px);
      }

      .start-button,
      .panel-toggle,
      .action-button {
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .start-button,
      .panel-toggle {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 12px;
        background: #ffffff;
        color: #111111;
      }

      .control-panel {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: max(12px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        max-height: min(54vh, 520px);
        padding: 12px;
        overflow: auto;
        border-radius: 8px;
        background: rgba(18, 18, 18, 0.86);
        color: #ffffff;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .creator-shell.is-collapsed .control-panel {
        display: none;
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .control-group {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .control-label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #f2f2f2;
        font-size: 12px;
        font-weight: 700;
      }

      .control-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 76px;
        gap: 8px;
        align-items: center;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #39d98a;
      }

      input[type="number"],
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #ffffff;
        font: inherit;
      }

      input[type="number"] {
        height: 36px;
        padding: 0 8px;
      }

      textarea {
        min-height: 110px;
        padding: 10px;
        resize: vertical;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        grid-template-columns: 1.4fr 1fr 0.8fr;
        gap: 8px;
      }

      .action-button {
        min-height: 40px;
        padding: 0 12px;
        background: #ffffff;
        color: #111111;
      }

      .action-button.secondary {
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
      }

      .action-button.primary {
        background: #39d98a;
        color: #06140d;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .top-bar {
          align-items: stretch;
        }

        .status {
          font-size: 12px;
        }

        .start-button,
        .panel-toggle {
          min-width: 72px;
        }

        .control-grid {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="creator-shell" id="creatorShell">
      <div class="top-bar">
        <div id="creatorStatus" class="status"></div>
        <button id="creatorStartButton" class="start-button"></button>
        <button id="panelToggle" class="panel-toggle" aria-expanded="true">ยุบ</button>
      </div>

      <section class="control-panel" aria-label="Overlay controls">
        <div class="control-grid" id="overlayControls"></div>
        <textarea id="overlaySnippet" readonly></textarea>
        <div class="actions">
          <button id="deployConfigButton" class="action-button primary">Save & Deploy</button>
          <button id="saveConfigButton" class="action-button">Save local</button>
          <button id="downloadSnippetButton" class="action-button secondary">Download</button>
        </div>
      </section>
    </div>

    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <video
          id="creatorArVideo"
          preload="auto"
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="creatorImageTarget">
        <a-video src="#creatorArVideo"></a-video>
      </a-entity>
    </a-scene>

    <script src="./src/creator-preview.js"></script>
  </body>
</html>
