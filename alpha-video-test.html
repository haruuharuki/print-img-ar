<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebM Alpha Diagnostic</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #111;
        background:
          linear-gradient(45deg, #ff4fd8 25%, transparent 25%),
          linear-gradient(-45deg, #00e0ff 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #ff4fd8 75%),
          linear-gradient(-45deg, transparent 75%, #00e0ff 75%);
        background-color: #ffe600;
        background-position: 0 0, 0 16px, 16px -16px, -16px 0;
        background-size: 32px 32px;
      }

      main {
        width: min(920px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 18px 0 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(24px, 5vw, 42px);
      }

      .panel {
        display: grid;
        gap: 14px;
        padding: 14px;
        border: 2px solid #111;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
      }

      .stage {
        display: grid;
        min-height: 54vh;
        place-items: center;
        border: 2px solid #111;
        border-radius: 8px;
        background:
          linear-gradient(45deg, #111 25%, transparent 25%),
          linear-gradient(-45deg, #111 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #111 75%),
          linear-gradient(-45deg, transparent 75%, #111 75%);
        background-color: #fff;
        background-position: 0 0, 0 18px, 18px -18px, -18px 0;
        background-size: 36px 36px;
      }

      video {
        display: block;
        width: min(78vw, 560px);
        max-height: 64vh;
        object-fit: contain;
      }

      button {
        min-height: 44px;
        border: 2px solid #111;
        border-radius: 8px;
        background: #111;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }

      dl {
        display: grid;
        grid-template-columns: minmax(120px, max-content) 1fr;
        gap: 8px 12px;
        margin: 0;
        overflow-wrap: anywhere;
      }

      dt {
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      #events {
        min-height: 72px;
        margin: 0;
        padding: 10px;
        overflow: auto;
        border: 1px solid #333;
        border-radius: 6px;
        background: #111;
        color: #9cff9c;
        font: 13px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="WebM alpha diagnostic">
        <h1>WebM Alpha Diagnostic</h1>
        <div class="stage">
          <video
            id="alphaVideo"
            src="./assets/overlays/nuwa.webm"
            autoplay
            muted
            loop
            playsinline
            webkit-playsinline
          ></video>
        </div>
        <button id="playButton" type="button">Play</button>
        <dl>
          <dt>Status</dt>
          <dd id="status">Initializing...</dd>
          <dt>Dimensions</dt>
          <dd id="dimensions">unknown</dd>
          <dt>canPlayType</dt>
          <dd id="canPlayType">checking...</dd>
          <dt>User agent</dt>
          <dd id="userAgent"></dd>
        </dl>
        <pre id="events" aria-label="Video events"></pre>
      </section>
    </main>

    <script>
      const video = document.querySelector("#alphaVideo");
      const playButton = document.querySelector("#playButton");
      const status = document.querySelector("#status");
      const dimensions = document.querySelector("#dimensions");
      const canPlayType = document.querySelector("#canPlayType");
      const userAgent = document.querySelector("#userAgent");
      const events = document.querySelector("#events");

      userAgent.textContent = navigator.userAgent;
      canPlayType.textContent = video.canPlayType("video/webm") || "(empty string)";

      function logEvent(name) {
        const now = new Date().toLocaleTimeString();
        const size = video.videoWidth && video.videoHeight
          ? `${video.videoWidth} x ${video.videoHeight}`
          : "unknown";
        status.textContent = name;
        dimensions.textContent = size;
        events.textContent += `[${now}] ${name} (${size})\n`;
      }

      ["loadedmetadata", "canplay", "playing", "pause", "ended"].forEach((name) => {
        video.addEventListener(name, () => logEvent(name));
      });

      video.addEventListener("error", () => {
        const error = video.error;
        const message = error ? `error code ${error.code}` : "unknown error";
        logEvent(`error: ${message}`);
      });

      playButton.addEventListener("click", async () => {
        try {
          await video.play();
          logEvent("manual play resolved");
        } catch (error) {
          logEvent(`manual play rejected: ${error.message}`);
        }
      });

      video.play().catch((error) => {
        logEvent(`autoplay rejected: ${error.message}`);
      });
    </script>
  </body>
</html>
